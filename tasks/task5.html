<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: url('ghostface-black-5120x2880-23043.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            color: #333;
            min-height: 100vh;
        }
        .container {
            background-color: rgba(0, 0, 0, 0.9);
            border: 1px solid #c4baba;
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            max-width: 650px;
            margin: 60px auto;
        }
        h1 {
            color: #a02121;
            border: 1px solid #c2a8a8;
            background-color: rgb(58, 119, 99);
            font-size: 3em;
            margin-bottom: 40px;
            font-weight: 700;
            text-align: center;
        }
        p {
            color: #ffcccc;
            font-size: 1.3em;
            line-height: 1.7;
            margin-bottom: 40px;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }
        button {
            background: rgb(58, 119, 99);
            color: #da2323;
            display: flex;
            border: none;
            align-items: center;
            justify-content: center;
            padding: 18px 35px;
            font-size: 1.2em;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(119, 121, 12, 0.4);
            transition: all 0.3s ease;
            margin: 20px auto 0;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.6);
        }
        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <h1>WELCOME TO OUR WEBSITE</h1>
    <div class="container">
        <p>Embrace the darkness. Fear is your guide. Welcome to where nightmares become reality.</p>
        
    </div>
    <button>KILL IT </button>
</body>
</html>
