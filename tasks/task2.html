<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Registration Form</h2>
    <form action="" method="get">
        <input type="text" name="name1" placeholder="Enter Your Name.."> <br><br>
        <input type="email" name="email" placeholder="Enter your email.."> <br><br>
        <input type="password" name="pass1" placeholder="Enter your password.."> <br><br>
        <input type="tel" name="contact" placeholder="Enter your phone number.."> <br><br>
        <input type="date" name="dob1" placeholder="Enter your DOB.."> <br><br>
        <label for=""> Gender:</label><br>
        <input type="radio" name="gender" value="male"> Male <br>
        <input type="radio" name="gender" value="female"> Female <br>
        <input type="radio" name="gender" value="other"> Other <br><br>
        <input type="submit" value="click me">
    </form>
</body>
