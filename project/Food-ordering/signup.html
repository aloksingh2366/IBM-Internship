<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup - Foodie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">🍔 Foodie</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <!-- Signup Container -->
  <div class="auth-container">
    <div class="signup-wrapper">
      <!-- Left Side - Brand Section -->
      <div class="login-brand">
        <div class="brand-content">
          <div class="brand-icon">🚀</div>
          <h1>Join Foodie</h1>
          <p>Start your delicious food adventure today</p>
          <ul class="brand-features">
            <li><i class="fas fa-check-circle"></i> Easy Signup</li>
            <li><i class="fas fa-check-circle"></i> Exclusive Offers</li>
            <li><i class="fas fa-check-circle"></i> Track Orders</li>
          </ul>
        </div>
      </div>

      <!-- Right Side - Signup Form -->
      <div class="auth-box signup-box">
        <div class="form-header">
          <h2>Create Account 🚀</h2>
          <p>Join our food community</p>
        </div>

        <form id="signupForm" class="signup-form">
          <!-- Full Name Input -->
          <div class="form-group">
            <label for="name">Full Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input 
                type="text" 
                id="name" 
                name="name" 
                placeholder="John Doe" 
                required
              >
            </div>
            <span class="error-msg" id="nameError"></span>
          </div>

          <!-- Email Input -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input 
                type="email" 
                id="email" 
                name="email" 
                placeholder="you@example.com" 
                required
              >
            </div>
            <span class="error-msg" id="emailError"></span>
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="••••••••" 
                required
              >
              <button type="button" class="toggle-password" id="togglePassword">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <span class="error-msg" id="passwordError"></span>
            <small class="password-hint">Min. 6 characters with letters & numbers</small>
          </div>

          <!-- Confirm Password Input -->
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input 
                type="password" 
                id="confirmPassword" 
                name="confirmPassword" 
                placeholder="••••••••" 
                required
              >
              <button type="button" class="toggle-password" id="toggleConfirmPassword">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <span class="error-msg" id="confirmPasswordError"></span>
          </div>

          <!-- Account Type Selection -->
          <div class="account-type">
            <label>Account Type</label>
            <div class="type-options">
              <label class="type-option">
                <input type="radio" name="role" value="user" checked>
                <span class="type-label">
                  <i class="fas fa-user-circle"></i>
                  <div>
                    <strong>Customer</strong>
                    <small>Order food</small>
                  </div>
                </span>
              </label>
              <label class="type-option">
                <input type="radio" name="role" value="admin">
                <span class="type-label">
                  <i class="fas fa-user-shield"></i>
                  <div>
                    <strong>Admin</strong>
                    <small>Manage store</small>
                  </div>
                </span>
              </label>
            </div>
          </div>

          <!-- Terms Checkbox -->
          <div class="terms-checkbox">
            <label>
              <input type="checkbox" id="terms" name="terms" required>
              <span>I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></span>
            </label>
            <span class="error-msg" id="termsError"></span>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn-signup">
            <span>Create Account</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </form>

        <!-- Login Link -->
        <p class="auth-link">
          Already have an account? 
          <a href="login.html">Login here</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
