<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Food - Foodie Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-dashboard-page food-management-page">

<header class="navbar">
  <div class="logo">🍔 Foodie Admin</div>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="manage-users.html">Users</a>
    <a href="manage-orders.html">Orders</a>
    <a href="manage-food.html">Food Items</a>
    <a href="manage-restaurants.html">Restaurants</a>
  </nav>
</header>

<main class="admin-dashboard-wrap food-manage-wrap">
  <section class="admin-panel admin-intro food-intro">
    <div>
      <p class="admin-badge">Menu Management</p>
      <h1>Manage Food Items</h1>
      <p>Add dishes, monitor pricing, and keep your catalog updated from one place.</p>
    </div>
    <a class="admin-primary-btn" href="dashboard.html">Back to Dashboard</a>
  </section>

  <section class="admin-panel food-controls-card">
    <div class="food-stat-grid">
      <div class="food-stat-box">
        <span class="food-stat-box__label">Total Items</span>
        <strong class="food-stat-box__value" id="totalFoodCount">0</strong>
      </div>
      <div class="food-stat-box">
        <span class="food-stat-box__label">Avg Price</span>
        <strong class="food-stat-box__value" id="avgFoodPrice">₹0</strong>
      </div>
      <div class="food-stat-box">
        <span class="food-stat-box__label">Most Expensive</span>
        <strong class="food-stat-box__value" id="topFoodPrice">₹0</strong>
      </div>
    </div>

    <form class="food-form" id="foodForm">
      <label>
        <span>Food Name</span>
        <input type="text" id="foodName" placeholder="Ex: Paneer Tikka" required>
      </label>
      <label>
        <span>Price (₹)</span>
        <input type="number" id="foodPrice" placeholder="Ex: 199" min="1" required>
      </label>
      <label>
        <span>Category</span>
        <select id="foodCategory">
          <option value="main-course">Main Course</option>
          <option value="starter">Starter</option>
          <option value="fast-food">Fast Food</option>
          <option value="dessert">Dessert</option>
          <option value="beverage">Beverage</option>
        </select>
      </label>
      <button type="submit" class="food-add-btn">Add Food Item</button>
    </form>

    <label class="food-search" for="foodSearchInput">
      <span>Search Food</span>
      <input id="foodSearchInput" type="text" placeholder="Search by name or category..." autocomplete="off">
    </label>
  </section>

  <section class="admin-panel food-list-card">
    <div id="foodContainer" class="food-list-grid"></div>
  </section>
</main>

<script>
  const defaultFoods = [
    { name: 'Pizza', price: 199, category: 'fast-food' },
    { name: 'Burger', price: 99, category: 'fast-food' },
    { name: 'Noodles', price: 149, category: 'main-course' },
    { name: 'Biryani', price: 249, category: 'main-course' }
  ];

  let allFoods = [];

  function formatCategory(category) {
    return (category || 'main-course')
      .split('-')
      .map(word => word.charAt(0).toUpperCase() + word.slice(1))
      .join(' ');
  }

  function updateFoodStats() {
    const totalFoodCount = document.getElementById('totalFoodCount');
    const avgFoodPrice = document.getElementById('avgFoodPrice');
    const topFoodPrice = document.getElementById('topFoodPrice');

    totalFoodCount.textContent = allFoods.length;

    if (!allFoods.length) {
      avgFoodPrice.textContent = '₹0';
      topFoodPrice.textContent = '₹0';
      return;
    }

    const totalPrice = allFoods.reduce((sum, food) => sum + (Number(food.price) || 0), 0);
    const avgPrice = Math.round(totalPrice / allFoods.length);
    const maxPrice = Math.max(...allFoods.map(food => Number(food.price) || 0));

    avgFoodPrice.textContent = `₹${avgPrice}`;
    topFoodPrice.textContent = `₹${maxPrice}`;
  }

  function renderFoods(foods) {
    const container = document.getElementById('foodContainer');
    updateFoodStats();

    if (!foods.length) {
      container.innerHTML = '<p class="food-empty">No matching food items found</p>';
      return;
    }

    container.innerHTML = foods.map((food) => {
      const index = allFoods.indexOf(food);
      return `
      <article class="food-item-card">
        <div class="food-item-card__top">
          <h3>${food.name}</h3>
          <span class="food-category-chip">${formatCategory(food.category)}</span>
        </div>
        <p class="food-item-price">₹${Number(food.price) || 0}</p>
        <div class="food-item-actions">
          <button class="food-delete-btn" onclick="deleteFood(${index})">Delete</button>
        </div>
      </article>
    `;
    }).join('');
  }

  function loadFoods() {
    allFoods = JSON.parse(localStorage.getItem('foods')) || defaultFoods;
    renderFoods(allFoods);
  }

  function addFood() {
    const name = document.getElementById('foodName').value.trim();
    const price = parseInt(document.getElementById('foodPrice').value, 10);
    const category = document.getElementById('foodCategory').value;

    if (!name || !price || price <= 0) {
      alert('Please enter food name and price');
      return;
    }

    allFoods.push({ name, price, category });
    localStorage.setItem('foods', JSON.stringify(allFoods));

    document.getElementById('foodName').value = '';
    document.getElementById('foodPrice').value = '';
    document.getElementById('foodCategory').value = 'main-course';

    renderFoods(allFoods);
  }

  function deleteFood(index) {
    if (index < 0) return;

    if (confirm('Delete this food item?')) {
      allFoods.splice(index, 1);
      localStorage.setItem('foods', JSON.stringify(allFoods));

      const query = document.getElementById('foodSearchInput').value.toLowerCase().trim();
      if (!query) {
        renderFoods(allFoods);
        return;
      }

      const filteredFoods = allFoods.filter((food) =>
        (food.name || '').toLowerCase().includes(query) ||
        (food.category || '').toLowerCase().includes(query)
      );
      renderFoods(filteredFoods);
    }
  }

  document.getElementById('foodForm').addEventListener('submit', (event) => {
    event.preventDefault();
    addFood();
  });

  document.getElementById('foodSearchInput').addEventListener('input', (event) => {
    const query = event.target.value.toLowerCase().trim();

    if (!query) {
      renderFoods(allFoods);
      return;
    }

    const filteredFoods = allFoods.filter((food) =>
      (food.name || '').toLowerCase().includes(query) ||
      (food.category || '').toLowerCase().includes(query)
    );

    renderFoods(filteredFoods);
  });

  loadFoods();
</script>
<script src="../js/admin.js"></script>
</body>
</html>
