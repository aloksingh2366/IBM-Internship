<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Users - Foodie Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-dashboard-page users-management-page">

<header class="navbar">
  <div class="logo">🍔 Foodie Admin</div>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="manage-users.html">Users</a>
    <a href="manage-orders.html">Orders</a>
    <a href="manage-food.html">Food Items</a>
    <a href="manage-restaurants.html">Restaurants</a>
  </nav>
</header>

<main class="admin-dashboard-wrap users-manage-wrap">
  <section class="admin-panel admin-intro users-intro">
    <div>
      <p class="admin-badge">User Directory</p>
      <h1>Manage Users</h1>
      <p>View all registered accounts, search by name or email, and remove users when needed.</p>
    </div>
    <a class="admin-primary-btn" href="dashboard.html">Back to Dashboard</a>
  </section>

  <section class="admin-panel users-controls-card">
    <div class="users-controls">
      <div class="users-stat">
        <span class="users-stat__label">Total Users</span>
        <span class="users-stat__value" id="totalUsersCount">0</span>
      </div>

      <label class="users-search" for="userSearchInput">
        <span>Search</span>
        <input
          id="userSearchInput"
          type="text"
          placeholder="Search by name or email..."
          autocomplete="off"
        >
      </label>
    </div>

    <div class="users-table-wrap">
      <table class="admin-table users-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr>
            <td colspan="4">No users yet</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<script>
  let allUsers = [];

  function roleBadge(role) {
    const safeRole = role === 'admin' ? 'admin' : 'user';
    const label = safeRole.charAt(0).toUpperCase() + safeRole.slice(1);
    return `<span class="role-chip role-chip--${safeRole}">${label}</span>`;
  }

  function renderUsers(users) {
    const tbody = document.getElementById('usersTable');
    const totalUsersCount = document.getElementById('totalUsersCount');
    totalUsersCount.textContent = allUsers.length;

    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4">No matching users found</td></tr>';
      return;
    }

    tbody.innerHTML = users.map((user, i) => {
      const index = allUsers.findIndex(
        (u) => u.email === user.email && u.name === user.name && (u.role || 'user') === (user.role || 'user')
      );

      return `
      <tr>
        <td>${user.name || '-'}</td>
        <td>${user.email || '-'}</td>
        <td>${roleBadge(user.role)}</td>
        <td>
          <button class="users-delete-btn" onclick="deleteUser(${index})">Delete</button>
        </td>
      </tr>
    `;
    }).join('');
  }

  function loadUsers() {
    allUsers = JSON.parse(localStorage.getItem('users')) || [];
    renderUsers(allUsers);
  }

  function deleteUser(index) {
    if (index < 0) return;

    if (confirm('Are you sure you want to delete this user?')) {
      allUsers.splice(index, 1);
      localStorage.setItem('users', JSON.stringify(allUsers));
      const searchInput = document.getElementById('userSearchInput').value.toLowerCase().trim();
      if (!searchInput) {
        renderUsers(allUsers);
      } else {
        const filteredUsers = allUsers.filter((user) =>
          (user.name || '').toLowerCase().includes(searchInput) ||
          (user.email || '').toLowerCase().includes(searchInput)
        );
        renderUsers(filteredUsers);
      }
    }
  }

  document.getElementById('userSearchInput').addEventListener('input', (event) => {
    const query = event.target.value.toLowerCase().trim();
    if (!query) {
      renderUsers(allUsers);
      return;
    }

    const filteredUsers = allUsers.filter((user) =>
      (user.name || '').toLowerCase().includes(query) ||
      (user.email || '').toLowerCase().includes(query)
    );

    renderUsers(filteredUsers);
  });

  loadUsers();
</script>
<script src="../js/admin.js"></script>
</body>
</html>
