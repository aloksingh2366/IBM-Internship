<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Success - Foodie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">

  <style>
    .success-container {
      height: 90vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .success-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      max-width: 400px;
    }

    .success-box h1 {
      color: green;
      margin-bottom: 10px;
    }

    .success-box p {
      color: gray;
      margin-bottom: 20px;
    }

    .success-box button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .home-btn {
      background: #ff4d4d;
      color: white;
    }

    .orders-btn {
      background: black;
      color: white;
    }

    .tick {
      font-size: 60px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

<header class="navbar">
  <div class="logo">🍔 Foodie</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="orders.html">Orders 📦</a>
  </nav>
</header>

<div class="success-container">
  <div class="success-box">

    <div class="tick">✅</div>

    <h1>Order Placed!</h1>
    <p>Your food is on the way 🚀</p>

    <p>Estimated delivery: <strong>30-40 mins</strong></p>

    <button class="home-btn" onclick="goHome()">Go to Home</button>
    <button class="orders-btn" onclick="viewOrders()">View Orders</button>

  </div>
</div>

<script>
  function goHome() {
    window.location.href = "index.html";
  }

  function viewOrders() {
    window.location.href = "orders.html";
  }
</script>

</body>
</html>
