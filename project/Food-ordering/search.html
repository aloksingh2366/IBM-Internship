<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search - Foodie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="search-page">

<header class="navbar">
  <div class="logo">🍔 Foodie</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="restaurants.html">Restaurants</a>
    <a href="cart.html">Cart 🛒</a>
    <a href="wishlist.html">Wishlist ❤️</a>
    <a href="profile.html">Profile 👤</a>
  </nav>
</header>

<section class="search-shell">
  <section class="search-hero">
    <p class="search-badge">Discovery</p>
    <h2>Find Your Next Meal</h2>
    <p>Search by dish or category and instantly discover matching items from your menu.</p>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search food, category, or craving..." autocomplete="off">
      <button type="button" onclick="searchFood()">Search</button>
    </div>
  </section>

  <section class="search-results-section foods">
    <div class="search-results-head">
      <h3>Search Results</h3>
      <p>Tap any dish to add it to cart or wishlist.</p>
    </div>

    <div class="food-container" id="searchResults"></div>
  </section>
</section>

<script src="js/search.js"></script>
</body>
</html>
