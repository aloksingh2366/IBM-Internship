<!-- Design a notification box that displays an important message.
Use different border properties such as border-width, border-style, and border-color to make the notification visually distinct from the rest of the page. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>
    <style>
        .notification {
            width: 90%;
            max-width: 700px;
            margin: 40px auto;
            padding: 15px;
            background-color: #b9e283;
            border: 3px solid #6e5912;
            color: #334220;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div class="notification">
        <p><strong>Important:</strong> Lorem, ipsum dolor sit amet consectetur adipisicing elit. Fugit repellendus ipsum magnam corrupti ex, ipsa odio nesciunt! Deserunt, facere optio.</p>
    </div>
</body>
</html>
