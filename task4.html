<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Section</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
        }
        .welcome-section {
            background-color: #81d39a; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('ghostface-black-5120x2880-23043.png'); 
            background-position: center center; 
            background-size: cover; 
            background-repeat: no-repeat; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgb(255, 39, 23); 
            text-align: center;
            padding: 20px;
        }
        .welcome-section h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); 
        }
        .welcome-section p {
            font-size: 1.2em;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        .btn {
            background-color: #7eff14;
            color: rgb(71, 46, 46);
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #681212;
            color: springgreen;
        }
    </style>
</head>
<body>
    <section class="welcome-section">
        <h1>Welcome to Our Website</h1>
        <p>Discover amazing things and explore our content. We're glad you're here!</p>
        <a href="#" class="btn">Get Started</a>
    </section>
</body>
</html>
